services:
  - type: web
    name: skyfit-pro-app
    runtime: docker
    plan: free
    region: oregon
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      # IMPORTANT: To pass these to the Docker build step on Render, 
      # you MUST also create them with the prefix DOCKER_BUILD_ARG_ in the Render Dashboard.
      # Example: DOCKER_BUILD_ARG_FIREBASE_API_KEY = your_key_here
