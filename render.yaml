services:
  - type: web
    name: skyfit-pro-app
    runtime: docker
    plan: free
    region: oregon
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DOCKER_BUILD_ARG_OPENWEATHER_API_KEY
        sync: false
      - key: DOCKER_BUILD_ARG_FIREBASE_API_KEY
        sync: false
      - key: DOCKER_BUILD_ARG_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: DOCKER_BUILD_ARG_FIREBASE_PROJECT_ID
        sync: false
      - key: DOCKER_BUILD_ARG_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: DOCKER_BUILD_ARG_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: DOCKER_BUILD_ARG_FIREBASE_APP_ID
        sync: false
      - key: DOCKER_BUILD_ARG_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: DOCKER_BUILD_ARG_FACEBOOK_APP_ID
        sync: false
      - key: DOCKER_BUILD_ARG_GOOGLE_CLIENT_ID
        sync: false
